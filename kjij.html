        /* تنسيقات الزر المتوافقة مع كافة المتصفحات والشاشات */
        .action-button {
            display: inline-block;
            padding: 12px 40px !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px !important;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            width: auto;

            /* اللون البنفسجي الفاتح */
            background: #D8B4FE !important;
            color: #4A1D96 !important;
            border: 1px solid #C084FC !important;

            /* حدود الزر مع دعم المتصفحات القديمة */
            -webkit-border-radius: 4px !important;
            -moz-border-radius: 4px !important;
            border-radius: 4px !important;

            /* تأثير انتقال ناعم مع دعم المتصفحات القديمة */
            -webkit-transition: all 0.3s ease;
            -moz-transition: all 0.3s ease;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background: #C084FC !important; /* لون أغمق قليلاً */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* تنسيقات خاصة بشاشات الهواتف */
        @media (max-width: 768px) {
            .action-button {
                width: 100%; /* اجعل الزر يمتد على كامل العرض */
                margin-bottom: 1rem; /* أضف هامشًا سفليًا */
                padding-top: 15px; /* تعديل الحشوة لتجربة لمس أفضل */
                padding-bottom: 15px;
            }
        }
    </style>
